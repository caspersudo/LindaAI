# Render Blueprint — deploys the FastAPI service on the free tier.
# In the Render dashboard: New > Blueprint > point at this repo.
services:
  - type: web
    name: lindaai-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # set this to your Vercel URL after the frontend deploys
